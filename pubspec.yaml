name: revomaket_app
description: "Revomaket - Official mobile app for revomaket.com."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView
  flutter_inappwebview: ^6.1.5

  # Auth0 (via the generic AppAuth OAuth/OIDC client)
  flutter_appauth: ^8.0.0
  jwt_decoder: ^2.0.1

  # Secure storage / local
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Connectivity / network
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.5.2

  # External links / launching
  url_launcher: ^6.3.1

  # Permissions
  permission_handler: ^11.3.1

  # Device / app info
  package_info_plus: ^8.1.1
  device_info_plus: ^11.1.0

  # State management
  provider: ^6.1.2

  # Push notifications (Firebase)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.4

  # Deep linking
  app_links: ^6.3.2

  # Environment configuration
  flutter_dotenv: ^5.2.1

  # UI / UX
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Logging
  logger: ^2.4.0

  # Biometrics (optional unlock)
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.2
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/

# ---------------------------------------------------------------------------
# Native splash screen (run: dart run flutter_native_splash:create)
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#0F172A"
    image_dark: assets/images/splash_logo.png
    icon_background_color_dark: "#0F172A"
  android: true
  ios: true
  fullscreen: false

# ---------------------------------------------------------------------------
# App launcher icons (run: dart run flutter_launcher_icons)
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
